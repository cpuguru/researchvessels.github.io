        /* Print styles */

                margin-bottom: 10px;
            }

                font-size: 1.2em;
                margin-top: 15px;
            }
            dt, dd {
                font-size: 0.9em;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-bg">
        <div class="container">
            <a href="index.html">
                <img src="https://researchvessels.org/images/IRVSI-oceanic-header.jpg" alt="International Research Vessel Schedules Logo" class="img-fluid" loading="lazy">

    <!-- Navigation -->

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="https://researchvessels.org">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="data_entry_forms.htm">Update Ship Data</a></li>

    <!-- Main Content -->
    <main class="container">
        <div class="content-section">
            <h1>Ship Details</h1>
            <div id="shipDetails"></div>
            <a href="index.html" class="back-link">Back to Ship List</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2025 <a href="https://oceandata.org/">OCEANIC</a> - <a href="https://researchvessels.org/">Ships Schedules & Information Pages</a> | Email: <a href="mailto:info@oceandata.org">info@oceandata.org</a></p>
            <a href="#top" class="btn btn-outline-light btn-sm mt-2">Back to Top</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Define the URL for fetching JSON
        const jsonUrl = 'ship_info.json';

        // Function to get query parameter from URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Function to display ship details
        function displayShipDetails(ship) {
            const detailsDiv = document.getElementById('shipDetails');
            if (!ship) {
                detailsDiv.innerHTML = '<p class="error-message">Ship not found.</p>';
                return;
            }

            let html = '<h2>' + (ship.shipname || 'Unknown Ship') + ' (ID: ' + (ship.shipID || 'N/A') + ')</h2>';
            html += '<dl>';

            // Iterate over the fields in their natural order (as they appear in the JSON)
            for (const key in ship) {
                if (ship.hasOwnProperty(key)) {
                    let value = ship[key];
                    if (value === null || value === undefined || value === '') {
                        value = 'N/A'; // Display "N/A" for empty or undefined fields
                    }
                    // Handle URLs specially
                    if (key.toLowerCase().includes('url') && value !== 'N/A') {
                        value = `<a href="${value}" target="_blank">${value}</a>`;
                    }
                    html += `<dt>${key.replace(/_/g, ' ')}</dt><dd>${value}</dd>`;
                }
            }

            html += '</dl>';
            detailsDiv.innerHTML = html;
        }

        // Fetch the JSON data and display details
        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status} ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                const ships = data?.dataroot?.ship_info || [];
                if (ships.length === 0) {
                    document.getElementById('shipDetails').innerHTML = '<p class="error-message">No ship data found in JSON.</p>';
                    return;
                }

                // Get the shipID from the URL query parameter
                const shipID = getQueryParam('shipID');
                if (!shipID) {
                    document.getElementById('shipDetails').innerHTML = '<p class="error-message">No Ship ID provided in URL.</p>';
                    return;
                }

                // Find the ship with the matching shipID
                const ship = ships.find(s => s.shipID.toString() === shipID.toString());
                displayShipDetails(ship);
            })
            .catch(error => {
                console.error('Error fetching or processing JSON:', error.message || error);
                document.getElementById('shipDetails').innerHTML = '<p class="error-message">Error loading ship data: ' + (error.message || 'Unknown error') + '</p>';
            });
    </script>
</body>
</html>
