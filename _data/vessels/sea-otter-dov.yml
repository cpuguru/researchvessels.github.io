record_updated: 2005-06-28
notes: "DOV
Operating Depth 457m; Payload 249kg; Life Support 200 man hours
one stern mounted, 3hp main thruster w/ rotatable kortz nozzle, lateral control via a .5hp bow thruster
oxygen tanks carried internally in 3 40 c. ft. tanks, carbon dioxide removed by absorbant scrubber, emergengy breathing gas via air BIBS
six 4\" conical viewports: 4 forward, 1 port, 1 starboard; four 2\" conical viewports in conning tower
one 6-function manipulator, MK1 type; hydraulic bow-mounted \"A\" frame provides platform for core samplers, cutters, and collection basket
hydraulic cutters/tools, sampling equipment, jetting/dredging pumps"
