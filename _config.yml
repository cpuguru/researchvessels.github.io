title: Global Research Vessel Schedules
description: Explore schedules, specifications, and information for research vessels worldwide.
url: https://researchvessels.org
baseurl: ""

# Build settings
markdown: kramdown
plugins:
  - jekyll-seo-tag

# Collections
collections:
  vessels:
    output: true
    permalink: /vessels/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: vessels
    values:
      layout: vessel

# Exclude from build
exclude:
  - migrate.ps1
  - convert-to-collection.ps1
  - ship_info.json
  - ship_info.xml
  - ship_info.xsd
  - ship_info.xsd
  - CruiseScheduleSpreadsheet.xls
  - Ship_Specification_Form.doc
  - Ship_Specification_Form.pdf
  - Gemfile
  - Gemfile.lock
  - README.md
  - _data/vessels
