<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Vessels</title>
    <!-- DataTables CSS (via CDN) -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- DataTables JS (via CDN) -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        /* Header Styling */
        header {
            background-color: #fff;
            padding: 20px;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }
        header h1 {
            font-size: 2em;
            font-weight: bold;
            margin: 0;
        }
        header p {
            font-size: 1.1em;
            color: #666;
            margin: 5px 0 0;
        }
        /* Navigation Styling */
        nav {
            background-color: #e5e5e5;
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            color: #0000EE;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover {
            text-decoration: underline;
        }
        /* Main Content Styling */
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        h2 {
            font-size: 1.8em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border: 1px solid #ccc;
        }
        th {
            background-color: #e5e5e5;
            color: #333;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f0f0f0;
        }
        a {
            color: #0000EE;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        /* DataTables Adjustments */
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter label {
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button {
            padding: 5px 10px;
            margin: 0 2px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background-color: #fff;
            color: #333;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background-color: #e5e5e5;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background-color: #e5e5e5;
            border: 1px solid #999;
        }
        /* Footer Styling */
        footer {
            background-color: #fff;
            border-top: 1px solid #ccc;
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
            margin-top: 20px;
        }
        footer a {
            color: #0000EE;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Research Vessels</h1>
        <p>Exploring the World's Oceans for Science</p> <!-- Placeholder tagline -->
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="vessels.html">Vessels</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h2>Vessel List</h2>
        <table id="shipTable" class="display">
            <thead>
                <tr>
                    <th>Ship ID</th>
                    <th>Ship Name</th>
                    <th>Operator Name</th>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody id="shipTableBody">
                <!-- Data will be populated dynamically via JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Research Vessels. All rights reserved. | <a href="contact.html">Contact Us</a></p>
    </footer>

    <script>
        // Fetch the JSON data
        fetch('https://researchvessels.org/ship_info.json')
            .then(response => response.json())
            .then(data => {
                // Assuming the data is an array of objects or nested in a specific key
                let ships = Array.isArray(data) ? data : data.ships || [];

                // Get the table body
                const tableBody = document.getElementById('shipTableBody');

                // Iterate over the ships and create table rows
                ships.forEach(ship => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${ship.shipID || 'N/A'}</td>
                        <td>${ship.shipname || 'N/A'}</td>
                        <td>${ship.Operator_Name || 'N/A'}</td>
                        <td><a href="${ship.url_ship || '#'}" target="_blank">${ship.url_ship || 'No URL'}</a></td>
                    `;
                    tableBody.appendChild(row);
                });

                // Initialize DataTables for sorting
                $('#shipTable').DataTable();
            })
            .catch(error => {
                console.error('Error fetching JSON:', error);
                document.getElementById('shipTableBody').innerHTML = '<tr><td colspan="4">Error loading data</td></tr>';
            });
    </script>
</body>
</html>
