<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View research vessel schedules and specifications on ResearchVessels.org.">
    <meta name="keywords" content="research vessels, ship data, oceanic, marine research">
    <meta property="og:title" content="Ship Data | ResearchVessels.org">
    <meta property="og:description" content="View research vessel schedules and specifications on ResearchVessels.org.">
    <meta property="og:image" content="https://researchvessels.org/images/logo.webp">
    <title>Ship Data | ResearchVessels.org</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
        }
        .header-bg {
            background: linear-gradient(135deg, #007bff 0%, #00c4cc 100%);
            padding: 0;
        }
        .header-bg img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card {
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        footer a {
            color: #ffffff;
            text-decoration: underline;
        }
        footer a:hover {
            color: #cccccc;
        }
        .content-section {
            padding: 2rem;
            border-radius: 8px;
        }
        #shipTable_wrapper {
            margin-top: 20px;
        }
        #shipTable th, #shipTable td {
            padding: 8px 12px;
            text-align: left;
        }
        #shipTable thead {
            background-color: #e5e5e5;
        }
        #shipTable tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #shipTable tbody tr:hover {
            background-color: #f0f0f0;
        }
        .filter-section {
            margin-bottom: 20px;
        }
        .filter-section label {
            margin-right: 10px;
            font-weight: bold;
        }
        .filter-section select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-bg">
        <div class="container">
            <a href="/">
                <img src="https://researchvessels.org/images/IRVSI-oceanic-header.jpg" alt="International Research Vessel Schedules Logo" class="img-fluid" loading="lazy">
            </a>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="https://www.oceandata.org">OCEANIC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="https://researchvessels.org">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="data_entry_forms.htm">Update Ship Data</a></li>
                    <li class="nav-item"><a class="nav-link" href="techlinks.htm">Tech Links</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="about_ships.html">About Ships</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="card shadow-sm content-section">
                    <h1 class="fs-2 mb-3 text-center">Research Vessel List</h1>
                    <div class="filter-section">
                        <label for="countryFilter">Filter by Country:</label>
                        <select id="countryFilter">
                            <option value="all">All Countries</option>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>
                    <table id="shipTable" class="display table table-bordered">
                        <thead>
                            <tr>
                                <th>Ship ID</th>
                                <th>Ship Name</th>
                                <th>Country</th>
                                <th>Operator Name</th>
                                <th>URL</th>
                            </tr>
                        </thead>
                        <tbody id="shipTableBody">
                            <!-- Data will be populated dynamically via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2025 <a href="https://oceandata.org/">OCEANIC</a> - <a href="https://researchvessels.org/">Ships Schedules & Information Pages</a> | Email: <a href="mailto:info@oceandata.org">info@oceandata.org</a></p>
            <a href="#top" class="btn btn-outline-light btn-sm mt-2">Back to Top</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Define the URL for fetching JSON
        const jsonUrl = 'ship_info.json'; // Assuming local copy

        // Global variables to store all ships and filtered ships
        let allShips = [];
        let table = null;

        // Function to populate the table
        function populateTable(ships) {
            // Destroy existing DataTable if it exists
            if (table) {
                table.destroy();
                document.getElementById('shipTableBody').innerHTML = '';
            }

            const tableBody = document.getElementById('shipTableBody');
            ships.forEach(ship => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${ship.shipID || 'N/A'}</td>
                    <td>${ship.shipname || 'N/A'}</td>
                    <td>${ship.country || 'N/A'}</td>
                    <td>${ship.Operator_Name || 'N/A'}</td>
                    <td><a href="${ship.url_ship || '#'}" target="_blank">${ship.url_ship || 'No URL'}</a></td>
                `;
                tableBody.appendChild(row);
            });

            // Initialize DataTables for sorting, default to Ship Name (column 1) ascending
            table = $('#shipTable').DataTable({
                "pageLength": 100,
                "lengthMenu": [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]],
                "order": [[1, 'asc']], // Sort by "Ship Name" (column 1) in ascending order
                "language": {
                    "lengthMenu": "Display _MENU_ ships per page"
                }
            });
        }

        // Function to populate the country dropdown
        function populateCountryDropdown(countries) {
            const countryFilter = document.getElementById('countryFilter');
            countries.sort();
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                countryFilter.appendChild(option);
            });
        }

        // Function to get unique countries
        function getUniqueCountries(ships) {
            const countries = new Set(ships.map(ship => ship.country || 'N/A'));
            return Array.from(countries);
        }

        // Function to filter ships based on selected country and oos
        function filterShips(selectedCountry) {
            let filteredShips = allShips.filter(ship => {
                const oosValue = parseInt(ship.oos);
                return !isNaN(oosValue) && oosValue === 0;
            });

            if (selectedCountry !== 'all') {
                filteredShips = filteredShips.filter(ship => (ship.country || 'N/A') === selectedCountry);
            }
            return filteredShips;
        }

        // Fetch the JSON data
        fetch(jsonUrl, {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
            },
            mode: 'cors',
            credentials: 'omit'
        })
            .then(response => {
                console.log('Fetch Response Status:', response.status);
                console.log('Fetch Response Headers:', response.headers);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status} ${response.statusText}`);
                }
                return response.text();
            })
            .then(text => {
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Failed to parse JSON: ' + e.message);
                }

                console.log('Fetched JSON Data:', data);

                allShips = data?.dataroot?.ship_info || [];

                if (allShips.length === 0) {
                    throw new Error('No ship data found in JSON');
                }

                console.log('Total Ships in JSON:', allShips.length);

                let initialShips = allShips.filter(ship => {
                    const oosValue = parseInt(ship.oos);
                    return !isNaN(oosValue) && oosValue === 0;
                });

                console.log('Filtered Ships (oos = 0):', initialShips.length);

                if (initialShips.length === 0) {
                    throw new Error('No active ships (oos = 0) found in JSON');
                }

                const uniqueCountries = getUniqueCountries(allShips);
                populateCountryDropdown(uniqueCountries);

                populateTable(initialShips);

                document.getElementById('countryFilter').addEventListener('change', (e) => {
                    const selectedCountry = e.target.value;
                    const filteredShips = filterShips(selectedCountry);
                    console.log(`Ships after country filter (${selectedCountry}):`, filteredShips.length);
                    populateTable(filteredShips);
                });
            })
            .catch(error => {
                console.error('Error fetching or processing JSON:', error.message || error);
                document.getElementById('shipTableBody').innerHTML = '<tr><td colspan="5">Error loading data: ' + (error.message || 'Unknown error') + '</td></tr>';
            });
    </script>
</body>
</html>
