<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View research vessel schedules and specifications on ResearchVessels.org.">
    <meta name="keywords" content="research vessels, ship data, oceanic, marine research">
    <meta property="og:title" content="Ship Data | ResearchVessels.org">
    <meta property="og:description" content="View research vessel schedules and specifications on ResearchVessels.org.">
    <meta property="og:image" content="https://researchvessels.org/images/logo.webp">
    <title>Ship Data | ResearchVessels.org</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
        }
        .header-bg {
            background: linear-gradient(135deg, #007bff 0%, #00c4cc 100%);
            padding: 0;
        }
        .header-bg img {
            width: 100%;
            height: auto;
            display: block;
        }
        .card {
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        footer a {
            color: #ffffff;
            text-decoration: underline;
        }
        footer a:hover {
            color: #cccccc;
        }
        .content-section {
            padding: 2rem;
            border-radius: 8px;
        }
        /* Adjust DataTables styling to fit the Bootstrap theme */
        #shipTable_wrapper {
            margin-top: 20px;
        }
        #shipTable th, #shipTable td {
            padding: 8px 12px;
            text-align: left;
        }
        #shipTable thead {
            background-color: #e5e5e5;
        }
        #shipTable tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #shipTable tbody tr:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-bg">
        <div class="container">
            <a href="/">
                <img src="https://researchvessels.org/images/IRVSI-oceanic-header.jpg" alt="International Research Vessel Schedules Logo" class="img-fluid" loading="lazy">
            </a>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="https://www.oceandata.org">OCEANIC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="https://researchvessels.org">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="data_entry_forms.htm">Update Ship Data</a></li>
                    <li class="nav-item"><a class="nav-link" href="techlinks.htm">Tech Links</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="about_ships.html">About Ships</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="card shadow-sm content-section">
                    <h1 class="fs-2 mb-3 text-center">Research Vessel List</h1>
                    <table id="shipTable" class="display table table-bordered">
                        <thead>
                            <tr>
                                <th>Ship ID</th>
                                <th>Ship Name</th>
                                <th>Operator Name</th>
                                <th>URL</th>
                            </tr>
                        </thead>
                        <tbody id="shipTableBody">
                            <!-- Data will be populated dynamically via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2025 <a href="https://oceandata.org/">OCEANIC</a> - <a href="https://researchvessels.org/">Ships Schedules & Information Pages</a> | Email: <a href="mailto:info@oceandata.org">info@oceandata.org</a></p>
            <a href="#top" class="btn btn-outline-light btn-sm mt-2">Back to Top</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Define the URL for fetching JSON
        const jsonUrl = 'https://researchvessels.org/ship_info.json'; // Try original URL
        // const jsonUrl = 'ship_info.json'; // Uncomment if using a local copy in your repo

        // Fetch the JSON data
        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Fetched JSON Data:', data); // Debugging: Log the data to console

                // Ensure data is an array
                let ships = Array.isArray(data) ? data : data.ships || [];

                if (ships.length === 0) {
                    throw new Error('No ship data found in JSON');
                }

                // Get the table body
                const tableBody = document.getElementById('shipTableBody');

                // Iterate over the ships and create table rows
                ships.forEach(ship => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${ship.shipID || 'N/A'}</td>
                        <td>${ship.shipname || 'N/A'}</td>
                        <td>${ship.Operator_Name || 'N/A'}</td>
                        <td><a href="${ship.url_ship || '#'}" target="_blank">${ship.url_ship || 'No URL'}</a></td>
                    `;
                    tableBody.appendChild(row);
                });

                // Initialize DataTables for sorting
                $('#shipTable').DataTable({
                    "pageLength": 10,
                    "lengthMenu": [10, 25, 50, 100]
                });
            })
            .catch(error => {
                console.error('Error fetching or processing JSON:', error.message || error);
                document.getElementById('shipTableBody').innerHTML = '<tr><td colspan="4">Error loading data: ' + (error.message || 'Unknown error') + '</td></tr>';
            });
    </script>
</body>
</html>
