<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="https://researchvessels.org/images/logo.webp">
  <title>{{ page.title | default: site.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; line-height: 1.6; }
    .header-bg { background: linear-gradient(135deg, #007bff 0%, #00c4cc 100%); padding: 0; }
    .header-bg img { width: 100%; height: auto; display: block; }
    footer a { color: #ffffff; text-decoration: underline; }
    footer a:hover { color: #cccccc; }
    .card { transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    {{ page.extra_css }}
  </style>
  {% if page.extra_head %}{{ page.extra_head }}{% endif %}
</head>
<body>
  {% include header.html %}
  {% include nav.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% if page.extra_scripts %}{{ page.extra_scripts }}{% endif %}
</body>
</html>
